<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mafiya — Oyun</title>
  <style>
    :root{
      --bg:#0f0e17;--surface:#1a1825;--surface2:#221f35;--border:#2e2b45;
      --accent:#c9392c;--accent2:#e8643a;--green:#2ecc71;--yellow:#f1c40f;
      --blue:#5dade2;--purple:#9b59b6;--orange:#e67e22;
      --text:#e8e6f0;--muted:#7a7890;--radius:10px;
      --font-display:'Georgia',serif;--font-body:'Segoe UI',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px}

    /* Header */
    .header{width:100%;max-width:720px;display:flex;align-items:center;
      justify-content:space-between;margin-bottom:20px;gap:10px}
    .header-title{font-family:var(--font-display);font-size:1.4rem;
      letter-spacing:.1em;text-transform:uppercase}
    .room-code{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:6px 14px;font-size:.82rem;color:var(--muted);
      cursor:pointer;user-select:none;transition:border-color .18s;white-space:nowrap}
    .room-code span{color:var(--text);font-weight:700;letter-spacing:.15em}
    .room-code:hover{border-color:var(--accent)}

    /* Main */
    .main{width:100%;max-width:720px}
    .screen{display:none}.screen.active{display:block}

    /* Card */
    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:20px 22px;margin-bottom:14px}
    .card-title{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
      color:var(--muted);margin-bottom:14px}

    /* Player list */
    .player-list{display:flex;flex-direction:column;gap:7px}
    .player-item{display:flex;align-items:center;gap:10px;padding:10px 13px;
      background:var(--surface2);border-radius:8px;border:1px solid transparent;
      transition:border-color .15s,opacity .2s}
    .player-item.dead{opacity:.38}
    .player-item.offline{opacity:.5}
    .player-item.clickable{cursor:pointer}
    .player-item.clickable:hover{border-color:var(--accent)}
    .player-item.selected{border-color:var(--accent2);background:#2a1a18}
    .avatar{width:33px;height:33px;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:.88rem;flex-shrink:0;color:#fff}
    .avatar.dead-av{background:var(--border);color:var(--muted)}
    .avatar.offline-av{background:#2a2840;color:var(--muted)}
    .pname{flex:1;font-size:.93rem}
    .badges{display:flex;gap:5px;flex-wrap:wrap}
    .badge{font-size:.68rem;padding:2px 7px;border-radius:20px;font-weight:600;
      letter-spacing:.04em;white-space:nowrap}
    .b-owner{background:#2a2215;color:var(--yellow);border:1px solid var(--yellow)}
    .b-you{background:#1a2a2a;color:var(--green);border:1px solid var(--green)}
    .b-dead{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
    .b-offline{background:#1e1c30;color:var(--muted);border:1px solid var(--border)}
    .b-votes{background:#2a1515;color:#ff7070;border:1px solid #cc3333;min-width:26px;text-align:center}

    /* Buttons */
    .btn{padding:12px 18px;border:none;border-radius:var(--radius);font-size:.93rem;
      font-weight:700;cursor:pointer;transition:opacity .18s,transform .1s;letter-spacing:.03em}
    .btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.32;cursor:not-allowed}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:100%}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);width:100%}
    .btn-ghost:hover{border-color:var(--accent);color:var(--text)}
    .btn-confirm{background:linear-gradient(135deg,#1a7a40,#27ae60);color:#fff;width:100%}
    .btn-warn{background:linear-gradient(135deg,#7a1a1a,#c0392b);color:#fff;width:100%}
    .btn-yellow{background:linear-gradient(135deg,#7a5a00,var(--yellow));color:#000;width:100%}

    /* Role card */
    .role-card{text-align:center;padding:28px 20px}
    .role-icon{font-size:3rem;margin-bottom:12px}
    .role-name{font-family:var(--font-display);font-size:1.9rem;letter-spacing:.08em;margin-bottom:8px}
    .role-name.mafia{color:var(--accent)}
    .role-name.detective{color:var(--blue)}
    .role-name.doctor{color:var(--green)}
    .role-name.citizen{color:var(--muted)}
    .role-name.mayor{color:var(--yellow)}
    .role-name.maniac{color:var(--purple)}
    .role-name.serialkiller{color:#e74c3c}
    .role-name.thief{color:var(--orange)}
    .role-desc{color:var(--muted);font-size:.88rem;line-height:1.55}
    .mafia-team-box{margin-top:14px;padding:10px 14px;background:#1e0f0f;
      border-radius:8px;border:1px solid #4a1515;color:var(--accent2);font-size:.84rem}

    /* Phase header */
    .phase-header{text-align:center;padding:18px 10px;margin-bottom:14px}
    .phase-icon{font-size:2.4rem;margin-bottom:7px}
    .phase-title{font-family:var(--font-display);font-size:1.55rem;letter-spacing:.06em;margin-bottom:5px}
    .phase-desc{color:var(--muted);font-size:.87rem}

    /* Timer */
    .timer-wrap{background:var(--surface2);border-radius:4px;height:5px;overflow:hidden;margin-bottom:12px}
    .timer-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
      transition:width 1s linear;border-radius:4px}
    .timer-label{text-align:center;color:var(--muted);font-size:.78rem;margin-bottom:14px}

    /* Announce banners */
    .announce{padding:13px 16px;border-radius:8px;margin-bottom:12px;font-size:.9rem;text-align:center}
    .ann-death{background:#2a0f0f;border:1px solid var(--accent);color:#ff9090}
    .ann-safe{background:#0f2a1a;border:1px solid var(--green);color:var(--green)}
    .ann-nominate{background:#2a2215;border:1px solid var(--yellow);color:var(--yellow)}
    .ann-info{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}

    /* Detective result */
    .det-result{padding:13px;border-radius:8px;text-align:center;font-size:.92rem;margin-top:12px}
    .det-mafia{background:#2a0f0f;border:1px solid var(--accent);color:var(--accent2)}
    .det-innocent{background:#0f2a1a;border:1px solid var(--green);color:var(--green)}

    /* Thief result */
    .thief-result{padding:13px;border-radius:8px;text-align:center;font-size:.92rem;margin-top:12px;
      background:#2a1a0a;border:1px solid var(--orange);color:var(--orange)}

    /* Game end */
    .result-banner{text-align:center;padding:30px 18px}
    .result-icon{font-size:3.8rem;margin-bottom:12px}
    .result-title{font-family:var(--font-display);font-size:2rem;letter-spacing:.08em;margin-bottom:7px}
    .result-town{color:var(--green)}.result-mafia{color:var(--accent)}
    .result-maniac{color:var(--purple)}.result-sk{color:#e74c3c}.result-desc{color:var(--muted);font-size:.88rem}
    .reveal-list{display:flex;flex-direction:column;gap:7px}
    .reveal-item{display:flex;align-items:center;gap:10px;padding:10px 13px;
      background:var(--surface2);border-radius:8px}
    .reveal-role{font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
    .rr-mafia{background:#2a0f0f;color:var(--accent);border:1px solid var(--accent)}
    .rr-detective{background:#0f1e2a;color:var(--blue);border:1px solid var(--blue)}
    .rr-doctor{background:#0f2a1a;color:var(--green);border:1px solid var(--green)}
    .rr-citizen{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
    .rr-mayor{background:#2a2200;color:var(--yellow);border:1px solid var(--yellow)}
    .rr-maniac{background:#1e0f2a;color:var(--purple);border:1px solid var(--purple)}
    .rr-serialkiller{background:#2a0505;color:#e74c3c;border:1px solid #e74c3c}
    .rr-thief{background:#2a1500;color:var(--orange);border:1px solid var(--orange)}

    /* Host config panel */
    .config-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .config-item{background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:6px}
    .config-role-name{font-size:.82rem;font-weight:600}
    .config-role-desc{font-size:.72rem;color:var(--muted);line-height:1.3}
    .config-input-row{display:flex;align-items:center;gap:8px;margin-top:4px}
    .config-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--surface);
      color:var(--text);border-radius:6px;font-size:1rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .config-btn:hover{border-color:var(--accent);color:var(--accent)}
    .config-count{flex:1;text-align:center;font-weight:700;font-size:1rem}
    .config-total{text-align:center;font-size:.82rem;padding:8px;border-radius:8px;
      background:var(--surface2);border:1px solid var(--border)}
    .config-total.ok{border-color:var(--green);color:var(--green)}
    .config-total.bad{border-color:var(--accent);color:var(--accent)}

    /* Moderator panel */
    .mod-panel{position:fixed;bottom:0;left:0;right:0;background:#12101f;
      border-top:1px solid var(--border);padding:12px 16px;
      display:none;gap:10px;z-index:100;max-width:720px;margin:0 auto}
    .mod-panel.visible{display:flex}
    .mod-btn{flex:1;padding:10px;border:none;border-radius:var(--radius);
      font-size:.82rem;font-weight:700;cursor:pointer;transition:opacity .18s}
    .mod-next{background:linear-gradient(135deg,#1a5a7a,#2980b9);color:#fff}
    .mod-elim{background:linear-gradient(135deg,#7a1a1a,var(--accent));color:#fff}
    .mod-btn:disabled{opacity:.35;cursor:not-allowed}

    /* Toast */
    #toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(80px);
      background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
      padding:11px 20px;font-size:.88rem;color:var(--text);z-index:999;
      transition:transform .3s ease;white-space:nowrap;max-width:90vw;text-align:center}
    #toast.show{transform:translateX(-50%) translateY(0)}

    @media(max-width:480px){
      .config-grid{grid-template-columns:1fr}
      .header-title{font-size:1.1rem}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">Mafiya</div>
  <div class="room-code" onclick="copyCode()">Kod: <span id="header-code">——</span></div>
</div>

<div class="main">

  <!-- ══ LOBİ ══ -->
  <div id="screen-lobby" class="screen active">
    <div class="card">
      <div class="card-title">Otaqdakılar</div>
      <div class="player-list" id="lobby-players"></div>
    </div>

    <!-- Host: Rol konfiqurasiyası -->
    <div class="card" id="config-card" style="display:none">
      <div class="card-title">Rol Konfiqurasiyası</div>
      <div class="config-grid" id="config-grid"></div>
      <div class="config-total" id="config-total" style="margin-top:12px"></div>
      <button class="btn btn-yellow" style="margin-top:12px" onclick="saveConfig()">Konfiqurasiyanı Saxla</button>
    </div>

    <!-- Host: Başlat -->
    <div id="owner-start" style="display:none">
      <button class="btn btn-primary" id="btn-start" onclick="startGame()">Oyunu Başlat</button>
      <p style="text-align:center;color:var(--muted);font-size:.8rem;margin-top:8px" id="start-hint"></p>
    </div>

    <!-- Non-host: Gözlə -->
    <div id="guest-wait" style="display:none">
      <div class="card" style="text-align:center;color:var(--muted);font-size:.88rem;padding:16px">
        Sahibin oyunu başlatmasını gözləyin...
      </div>
    </div>
  </div>

  <!-- ══ ROL ══ -->
  <div id="screen-role" class="screen">
    <div class="card role-card" id="role-card">
      <div class="role-icon" id="role-icon">🃏</div>
      <div class="role-name" id="role-name"></div>
      <div class="role-desc" id="role-desc"></div>
      <div class="mafia-team-box" id="mafia-team-box" style="display:none"></div>
    </div>
    <button class="btn btn-confirm" onclick="ackRole()">Anladım, davam et</button>
  </div>

  <!-- ══ GECƏ ══ -->
  <div id="screen-night" class="screen">
    <div class="phase-header">
      <div class="phase-icon">🌙</div>
      <div class="phase-title">Gecə</div>
      <div class="phase-desc" id="night-desc">Şəhər yatır...</div>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="night-bar" style="width:100%"></div></div>
    <div class="timer-label" id="night-label"></div>

    <div class="card" id="night-action-card" style="display:none">
      <div class="card-title" id="night-action-title">Hədəfini seç</div>
      <div class="player-list" id="night-players"></div>
      <button class="btn btn-confirm" style="margin-top:12px" id="btn-night-confirm"
        onclick="confirmNight()" disabled>Təsdiqlə</button>
    </div>

    <div class="card" id="night-wait-card">
      <p style="text-align:center;color:var(--muted)">Digər oyunçuları gözləyin...</p>
    </div>

    <div id="detective-result" class="det-result" style="display:none"></div>
    <div id="thief-result" class="thief-result" style="display:none"></div>
  </div>

  <!-- ══ GÜNDÜZ ══ -->
  <div id="screen-day" class="screen">
    <div class="phase-header">
      <div class="phase-icon">☀️</div>
      <div class="phase-title">Gündüz</div>
      <div class="phase-desc">Müzakirə edin!</div>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="day-bar" style="width:100%"></div></div>
    <div class="timer-label" id="day-label"></div>
    <div id="day-announces"></div>

    <div class="card">
      <div class="card-title">Birini nominasiya et</div>
      <div class="player-list" id="day-players"></div>
      <button class="btn btn-primary" style="margin-top:12px" id="btn-nominate"
        onclick="nominate()" disabled>Nominasiya et</button>
    </div>
  </div>

  <!-- ══ SƏSVERMƏs ══ -->
  <div id="screen-vote" class="screen">
    <div class="phase-header">
      <div class="phase-icon">🗳️</div>
      <div class="phase-title">Səsvermə</div>
      <div class="phase-desc">Kimi xaric etmək istəyirsiniz?</div>
    </div>
    <div class="timer-wrap"><div class="timer-bar" id="vote-bar" style="width:100%"></div></div>
    <div class="timer-label" id="vote-label"></div>

    <div class="card">
      <div class="card-title">Səsinizi verin</div>
      <div class="player-list" id="vote-players"></div>
      <button class="btn btn-primary" style="margin-top:12px" id="btn-vote"
        onclick="castVote()" disabled>Səs ver</button>
    </div>
  </div>

  <!-- ══ OYUN SONU ══ -->
  <div id="screen-ended" class="screen">
    <div class="card result-banner" id="result-banner"></div>
    <div class="card">
      <div class="card-title">Rolların açıqlanması</div>
      <div class="reveal-list" id="reveal-list"></div>
    </div>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="goHome()">Ana Səhifəyə Qayıt</button>
  </div>

</div><!-- /main -->

<!-- Moderator panel (yalnız owner üçün) -->
<div class="mod-panel" id="mod-panel">
  <button class="mod-btn mod-next" id="mod-btn-next" onclick="modNext()">⏭ Növbəti Faza</button>
  <button class="mod-btn mod-elim" id="mod-btn-elim" onclick="modElimMode()" disabled>🔪 Xaric Et</button>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── State ────────────────────────────────────────────────────
const myName   = sessionStorage.getItem('playerName');
const roomCode = sessionStorage.getItem('roomCode');
if (!myName || !roomCode) { window.location.href = '/'; }

document.getElementById('header-code').textContent = roomCode;

let myRole       = null;
let isOwner      = false;
let mySocketId   = null;
let currentPhase = 'lobby';
let currentPlayers = [];
let nightTarget  = null;
let dayTarget    = null;
let voteTarget   = null;
let hasActed     = false;
let hasVoted     = false;
let hasNominated = false;
let elimMode     = false;
let timers       = {};

// Rol məlumatları
const ROLE_INFO = {
  mafia:        { icon:'🔪', cls:'mafia',       desc:'Hər gecə bir vətəndaşı öldürürsünüz. Komandanızla işləyin.' },
  detective:    { icon:'🔍', cls:'detective',    desc:'Hər gecə bir oyunçunu yoxlayırsınız — Mafiamı, yox?' },
  doctor:       { icon:'💉', cls:'doctor',       desc:'Hər gecə bir oyunçunu qoruyursunuz. Özünüzü də qoruya bilərsiniz.' },
  citizen:      { icon:'👤', cls:'citizen',      desc:'Şəhəri qoruyun. Müzakirədə Mafiya üzvlərini tapın.' },
  mayor:        { icon:'🏛️', cls:'mayor',        desc:'Gizli Mayor! Səsvermədə sizin səsiniz 2 sayılır. Bunu gizli saxlayın.' },
  maniac:       { icon:'🤡', cls:'maniac',       desc:'Tərəfsizsiniz. Hər gecə birini öldürürsünüz. Tək qaldıqda qazanırsınız.' },
  serialkiller: { icon:'🗡️', cls:'serialkiller', desc:'Tərəfsizsiniz. Hər gecə birini öldürürsünüz. Hamıdan güclüsünüz.' },
  thief:        { icon:'🦝', cls:'thief',        desc:'Hər gecə birinin rolunu oğurlayırsınız. Oğurladığınız rolun tərəfindən qazanırsınız.' },
};

const ROLE_CLASS = { mafia:'rr-mafia',detective:'rr-detective',doctor:'rr-doctor',
  citizen:'rr-citizen',mayor:'rr-mayor',maniac:'rr-maniac',serialkiller:'rr-serialkiller',thief:'rr-thief' };

// Konfiqurasiya
const CONFIG_ROLES = [
  { key:'mafia',        name:'Mafia',         desc:'Hər gecə öldürür',               min:1 },
  { key:'detective',    name:'Dedektiv',       desc:'Gecə yoxlayır',                  min:0 },
  { key:'doctor',       name:'Həkim',          desc:'Gecə qoruyur',                   min:0 },
  { key:'mayor',        name:'Mayor',          desc:'Səsi 2 sayılır (gizli)',          min:0 },
  { key:'maniac',       name:'Manyak',         desc:'Tərəfsiz, tək qalsa qalib',      min:0 },
  { key:'serialkiller', name:'Serial Killer',  desc:'Tərəfsiz, güclü qatil',         min:0 },
  { key:'thief',        name:'Oğru',           desc:'Rol oğurlayır',                  min:0 },
  { key:'citizen',      name:'Vətəndaş',       desc:'Adi oyunçu',                     min:0 },
];
let configValues = { mafia:1, detective:1, doctor:1, citizen:1,
  mayor:0, maniac:0, serialkiller:0, thief:0 };

// ── Socket ───────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
  mySocketId = socket.id;
  socket.emit('room:rejoin', { code: roomCode, name: myName }, (res) => {
    if (!res.ok) { alert(res.error); window.location.href = '/'; return; }
    isOwner      = res.owner === socket.id;
    currentPhase = res.phase;
    currentPlayers = res.players || [];
    if (res.roleConfig) configValues = { ...configValues, ...res.roleConfig };

    if (res.phase === 'lobby') {
      updateLobby({ players: res.players, owner: res.owner });
      showScreen('lobby');
    } else if (res.myRole) {
      myRole = res.myRole;
      // Oyun davam edirsə birbaşa müvafiq fazaya keç
      resumePhase(res.phase, res.players);
    }
  });
});

function resumePhase(phase, players) {
  currentPlayers = players || currentPlayers;
  if (phase === 'night')  showNightScreen(currentPlayers, true);
  else if (phase === 'day')   showDayScreen([], currentPlayers, true);
  else if (phase === 'vote')  showVoteScreen(currentPlayers, true);
  else if (phase === 'ended') showScreen('ended');
}

// ── Room events ──────────────────────────────────────────────
socket.on('room:update', ({ players, owner }) => {
  isOwner = owner === socket.id;
  currentPlayers = players;
  if (currentPhase === 'lobby') updateLobby({ players, owner });
  updateModPanel();
});

socket.on('room:configUpdated', ({ config }) => {
  configValues = { ...configValues, ...config };
  if (isOwner) renderConfigGrid();
  toast('Rol konfiqurasiyası yeniləndi');
});

socket.on('player:disconnected', ({ name }) => toast(`⚡ ${name} bağlantısı kəsildi`));
socket.on('player:left',         ({ name }) => toast(`${name} otaqdan çıxdı`));

// ── Game events ──────────────────────────────────────────────
socket.on('game:started', ({ playerCount }) => toast(`Oyun başladı! ${playerCount} oyunçu`));

socket.on('game:role', ({ role, roleName, mafiaTeam }) => {
  myRole = role;
  showRoleScreen(role, roleName, mafiaTeam);
});

socket.on('phase:night', ({ players, roundNum }) => {
  currentPhase   = 'night';
  currentPlayers = players;
  showNightScreen(players, false, roundNum);
});

socket.on('phase:day', ({ killed, players, roundNum }) => {
  currentPhase   = 'day';
  currentPlayers = players;
  showDayScreen(killed, players, false, roundNum);
});

socket.on('phase:vote', ({ players }) => {
  currentPhase   = 'vote';
  currentPlayers = players;
  showVoteScreen(players);
});

socket.on('vote:update', ({ nominations }) => updateVoteBadges(nominations));

socket.on('vote:result', ({ eliminatedName, eliminatedRoleName, tie }) => {
  if (tie) toast('🤝 Bərabər səs — heç kim xaric edilmədi');
  else if (eliminatedName) toast(`⚖️ ${eliminatedName} (${eliminatedRoleName || '?'}) xaric edildi`);
  else toast('Heç kim xaric edilmədi');
});

socket.on('day:nominated', ({ nominator, targetName }) => {
  const c = document.getElementById('day-announces');
  c.innerHTML += `<div class="announce ann-nominate">⚠️ ${nominator}, ${targetName}-i nominasiya etdi</div>`;
});

socket.on('detective:result', ({ targetName, isMafia }) => {
  const el = document.getElementById('detective-result');
  el.style.display = 'block';
  el.className = isMafia ? 'det-result det-mafia' : 'det-result det-innocent';
  el.textContent = isMafia ? `🔴 ${targetName} — Mafiya üzvüdür!` : `🟢 ${targetName} — Masumdur`;
});

socket.on('thief:result', ({ targetName, stolenRoleName }) => {
  const el = document.getElementById('thief-result');
  el.style.display = 'block';
  el.textContent = `🦝 ${targetName}-dən "${stolenRoleName}" rolunu oğurladın!`;
});

socket.on('thief:stolen', ({ message }) => {
  myRole = 'citizen';
  toast('🦝 ' + message);
});

socket.on('mod:eliminated', ({ name }) => toast(`🔪 Moderator ${name}-i xaric etdi`));

socket.on('game:ended', ({ winner, rolesReveal }) => {
  currentPhase = 'ended';
  showEndScreen(winner, rolesReveal);
});

// ── Screens ──────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  updateModPanel();
}

// ── LOBİ ─────────────────────────────────────────────────────
function updateLobby({ players, owner }) {
  const list = document.getElementById('lobby-players');
  list.innerHTML = players.map(p => {
    const badges = [];
    if (p.id === owner)    badges.push('<span class="badge b-owner">Sahib</span>');
    if (p.id === socket.id) badges.push('<span class="badge b-you">Sən</span>');
    if (!p.connected)      badges.push('<span class="badge b-offline">Offline</span>');
    return `<div class="player-item ${!p.connected?'offline':''}">
      <div class="avatar">${p.name[0].toUpperCase()}</div>
      <div class="pname">${p.name}</div>
      <div class="badges">${badges.join('')}</div>
    </div>`;
  }).join('');

  const ownerStart = document.getElementById('owner-start');
  const guestWait  = document.getElementById('guest-wait');
  const configCard = document.getElementById('config-card');
  const btnStart   = document.getElementById('btn-start');
  const hint       = document.getElementById('start-hint');

  if (isOwner) {
    ownerStart.style.display = 'block';
    guestWait.style.display  = 'none';
    configCard.style.display = 'block';
    renderConfigGrid();
    const total = Object.values(configValues).reduce((s,v)=>s+(parseInt(v)||0),0);
    const ok    = total === players.length && players.length >= 4;
    btnStart.disabled = !ok;
    hint.textContent  = players.length < 4
      ? `Minimum 4 oyunçu lazımdır (${players.length}/4)`
      : ok ? `${players.length} oyunçu hazırdır` : `Rol sayı (${total}) oyunçu sayına (${players.length}) bərabər olmalıdır`;
  } else {
    ownerStart.style.display = 'none';
    guestWait.style.display  = 'block';
    configCard.style.display = 'none';
  }
}

function renderConfigGrid() {
  const playerCount = currentPlayers.length;
  const grid = document.getElementById('config-grid');
  grid.innerHTML = CONFIG_ROLES.map(r => `
    <div class="config-item">
      <div class="config-role-name">${ROLE_INFO[r.key]?.icon||''} ${r.name}</div>
      <div class="config-role-desc">${r.desc}</div>
      <div class="config-input-row">
        <button class="config-btn" onclick="changeConfig('${r.key}',-1)">−</button>
        <div class="config-count" id="cfg-${r.key}">${configValues[r.key]||0}</div>
        <button class="config-btn" onclick="changeConfig('${r.key}',1)">+</button>
      </div>
    </div>`).join('');
  updateConfigTotal(playerCount);
}

function changeConfig(key, delta) {
  const min = CONFIG_ROLES.find(r=>r.key===key)?.min || 0;
  configValues[key] = Math.max(min, (configValues[key]||0) + delta);
  const el = document.getElementById('cfg-' + key);
  if (el) el.textContent = configValues[key];
  updateConfigTotal(currentPlayers.length);
  updateStartBtn();
}

function updateConfigTotal(playerCount) {
  const total = Object.values(configValues).reduce((s,v)=>s+(parseInt(v)||0),0);
  const el    = document.getElementById('config-total');
  const ok    = total === playerCount;
  el.textContent = `Cəmi: ${total} / ${playerCount} oyunçu`;
  el.className   = 'config-total ' + (ok ? 'ok' : 'bad');
}

function updateStartBtn() {
  const total = Object.values(configValues).reduce((s,v)=>s+(parseInt(v)||0),0);
  const pc    = currentPlayers.length;
  const ok    = total === pc && pc >= 4;
  const btn   = document.getElementById('btn-start');
  const hint  = document.getElementById('start-hint');
  if (btn) btn.disabled = !ok;
  if (hint) hint.textContent = ok ? `${pc} oyunçu hazırdır`
    : pc < 4 ? `Minimum 4 oyunçu lazımdır (${pc}/4)`
    : `Rol sayı (${total}) oyunçu sayına (${pc}) bərabər olmalıdır`;
}

function saveConfig() {
  const playerCount = currentPlayers.length;
  const v = validateConfigClient(configValues, playerCount);
  if (!v.ok) { toast('❌ ' + v.error); return; }
  socket.emit('room:setConfig', { config: configValues }, (res) => {
    if (!res?.ok) toast('❌ ' + (res?.error||'Xəta'));
    else toast('✅ Konfiqurasiya saxlandı');
  });
}

function validateConfigClient(cfg, count) {
  const total = Object.values(cfg).reduce((s,v)=>s+(parseInt(v)||0),0);
  if (total !== count) return { ok:false, error:`Rol sayı (${total}) oyunçu sayına (${count}) bərabər olmalıdır` };
  if ((cfg.mafia||0) < 1) return { ok:false, error:'Minimum 1 Mafia olmalıdır' };
  return { ok:true };
}

// ── ROL ekranı ───────────────────────────────────────────────
function showRoleScreen(role, roleName, mafiaTeam) {
  const info = ROLE_INFO[role] || { icon:'🃏', cls:'citizen', desc:'' };
  document.getElementById('role-icon').textContent  = info.icon;
  document.getElementById('role-name').textContent  = roleName;
  document.getElementById('role-name').className    = 'role-name ' + info.cls;
  document.getElementById('role-desc').textContent  = info.desc;

  const mt = document.getElementById('mafia-team-box');
  if (role === 'mafia' && mafiaTeam?.length > 0) {
    mt.style.display = 'block';
    mt.textContent   = '🤝 Mafia partnyorlarınız: ' + mafiaTeam.join(', ');
  } else { mt.style.display = 'none'; }

  showScreen('role');
}

function ackRole() { showScreen('night'); }

// ── GECƏ ekranı ──────────────────────────────────────────────
function showNightScreen(players, resume, roundNum) {
  nightTarget = null; hasActed = false;
  document.getElementById('detective-result').style.display = 'none';
  document.getElementById('thief-result').style.display     = 'none';

  const actionRoles = ['mafia','detective','doctor','maniac','serialkiller','thief'];
  const myPlayer    = players.find(p => p.id === socket.id);
  const iAmAlive    = myPlayer?.alive !== false;
  const canAct      = actionRoles.includes(myRole) && iAmAlive;

  const nightDesc = { mafia:'Hədəfinizi seçin',detective:'Kimi yoxlamaq istəyirsiniz?',
    doctor:'Kimi qorumaq istəyirsiniz?',maniac:'Bu gecə kimi öldürürsünüz?',
    serialkiller:'Növbəti qurbanınız kim?',thief:'Kimin rolunu oğurlayırsınız?' };
  document.getElementById('night-desc').textContent = iAmAlive
    ? (nightDesc[myRole] || 'Gecəni seyr edin') : 'Siz ölmüsünüz. Gecəni seyr edin.';

  const ac = document.getElementById('night-action-card');
  const wc = document.getElementById('night-wait-card');

  if (canAct && !resume) {
    ac.style.display = 'block'; wc.style.display = 'none';
    const titles = { mafia:'🔪 Hədəfini seç', detective:'🔍 Yoxla', doctor:'💉 Qoru',
      maniac:'🤡 Hədəf', serialkiller:'🗡️ Qurban', thief:'🦝 Oğurla' };
    document.getElementById('night-action-title').textContent = titles[myRole] || 'Hədəfini seç';

    const targets = players.filter(p => p.alive && p.id !== socket.id);
    document.getElementById('night-players').innerHTML = targets.map(p =>
      `<div class="player-item clickable" data-id="${p.id}" onclick="selectNightTarget(this,'${p.id}')">
        <div class="avatar">${p.name[0].toUpperCase()}</div>
        <div class="pname">${p.name}</div>
      </div>`).join('');
    document.getElementById('btn-night-confirm').disabled = true;
    document.getElementById('btn-night-confirm').textContent = 'Təsdiqlə';
  } else {
    ac.style.display = 'none'; wc.style.display = 'block';
  }

  if (!resume) startTimer('night', 40);
  showScreen('night');
}

function selectNightTarget(el, id) {
  document.querySelectorAll('#night-players .player-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  nightTarget = id;
  document.getElementById('btn-night-confirm').disabled = false;
}

function confirmNight() {
  if (!nightTarget || hasActed) return;
  hasActed = true;
  socket.emit('night:action', { targetId: nightTarget });
  document.getElementById('btn-night-confirm').disabled  = true;
  document.getElementById('btn-night-confirm').textContent = '✓ Göndərildi';
  toast('Seçiminiz qeyd edildi');
}

// ── GÜNDÜZ ekranı ────────────────────────────────────────────
function showDayScreen(killed, players, resume, roundNum) {
  hasNominated = false; dayTarget = null;
  stopAllTimers();

  const ann = document.getElementById('day-announces');
  ann.innerHTML = '';

  if (killed && killed.length > 0) {
    killed.forEach(k => {
      if (k.saved) {
        ann.innerHTML += `<div class="announce ann-safe">🛡️ ${k.name} qorundu — sağ qaldı!</div>`;
      } else {
        ann.innerHTML += `<div class="announce ann-death">💀 ${k.name} bu gecə öldürüldü!</div>`;
      }
    });
  } else {
    ann.innerHTML = `<div class="announce ann-safe">🛡️ Bu gecə heç kim öldürülmədi!</div>`;
  }

  const myPlayer = players.find(p => p.id === socket.id);
  const iAmAlive = myPlayer?.alive !== false;

  document.getElementById('day-players').innerHTML = players.map(p => {
    const dead = !p.alive;
    const isMe = p.id === socket.id;
    const clickable = iAmAlive && !dead && !isMe;
    return `<div class="player-item ${dead?'dead':''} ${clickable?'clickable':''}"
      data-id="${p.id}" ${clickable?`onclick="selectDayTarget(this,'${p.id}')"`:''}>
      <div class="avatar ${dead?'dead-av':''}">${p.name[0].toUpperCase()}</div>
      <div class="pname">${p.name}${isMe?' (sən)':''}</div>
      ${dead ? '<span class="badge b-dead">Ölü</span>' : ''}
    </div>`;
  }).join('');

  document.getElementById('btn-nominate').disabled = true;
  if (!resume) startTimer('day', 60);
  showScreen('day');
}

function selectDayTarget(el, id) {
  document.querySelectorAll('#day-players .player-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  dayTarget = id;
  document.getElementById('btn-nominate').disabled = false;
}

function nominate() {
  if (!dayTarget || hasNominated) return;
  hasNominated = true;
  socket.emit('day:nominate', { targetId: dayTarget });
  document.getElementById('btn-nominate').disabled = true;
  toast('Nominasiya göndərildi');
}

// ── SƏSVERMƏs ekranı ─────────────────────────────────────────
function showVoteScreen(players, resume) {
  hasVoted = false; voteTarget = null;
  stopAllTimers();

  const myPlayer = players.find(p => p.id === socket.id);
  const iAmAlive = myPlayer?.alive !== false;

  document.getElementById('vote-players').innerHTML = players.filter(p=>p.alive).map(p => {
    const isMe = p.id === socket.id;
    const clickable = iAmAlive && !isMe;
    return `<div class="player-item ${clickable?'clickable':''}" id="vi-${p.id}"
      data-id="${p.id}" ${clickable?`onclick="selectVoteTarget(this,'${p.id}')"`:''}>
      <div class="avatar">${p.name[0].toUpperCase()}</div>
      <div class="pname">${p.name}${isMe?' (sən)':''}</div>
      <div class="badges"><span class="badge b-votes" id="vbadge-${p.id}">0</span></div>
    </div>`;
  }).join('');

  document.getElementById('btn-vote').disabled  = true;
  document.getElementById('btn-vote').textContent = 'Səs ver';
  if (!resume) startTimer('vote', 30);
  showScreen('vote');
}

function selectVoteTarget(el, id) {
  document.querySelectorAll('#vote-players .player-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  voteTarget = id;
  document.getElementById('btn-vote').disabled = false;
}

function castVote() {
  if (!voteTarget || hasVoted) return;
  hasVoted = true;
  socket.emit('vote:cast', { targetId: voteTarget });
  document.getElementById('btn-vote').disabled  = true;
  document.getElementById('btn-vote').textContent = '✓ Səs verildi';
  toast('Səsiniz qeyd edildi');
}

function updateVoteBadges(nominations) {
  Object.entries(nominations).forEach(([tid, count]) => {
    const el = document.getElementById('vbadge-' + tid);
    if (el) el.textContent = count;
  });
}

// ── OYUN SONU ────────────────────────────────────────────────
function showEndScreen(winner, rolesReveal) {
  stopAllTimers();
  const winnerMeta = {
    town:   { icon:'🏆', cls:'result-town',     text:'Şəhər Qurtarıldı!',        desc:'Bütün təhdidlər aradan qaldırıldı.' },
    mafia:  { icon:'🔪', cls:'result-mafia',    text:'Mafiya Qalib Gəldi!',      desc:'Şəhər Mafiyanın əlinə keçdi.' },
    maniac: { icon:'🤡', cls:'result-maniac',   text:'Manyak Qalib Gəldi!',      desc:'Tək qaldı — heç kim ona çatmadı.' },
    sk:     { icon:'🗡️', cls:'result-sk',       text:'Serial Killer Qalib Gəldi!',desc:'Hamısını tək məhv etdi.' },
  };
  const m = winnerMeta[winner] || winnerMeta.town;

  document.getElementById('result-banner').innerHTML = `
    <div class="result-icon">${m.icon}</div>
    <div class="result-title ${m.cls}">${m.text}</div>
    <div class="result-desc">${m.desc}</div>`;

  document.getElementById('reveal-list').innerHTML = rolesReveal.map(p => {
    const rc = ROLE_CLASS[p.role] || 'rr-citizen';
    const stolenInfo = p.stolenRole ? ` <span class="reveal-role ${ROLE_CLASS[p.stolenRole]||'rr-citizen'}" style="opacity:.7">← ${p.stolenRoleName}</span>` : '';
    return `<div class="reveal-item">
      <div class="avatar ${!p.alive?'dead-av':''}">${p.name[0].toUpperCase()}</div>
      <div class="pname" style="${!p.alive?'opacity:.5':''}">${p.name}</div>
      <div class="badges">
        <span class="reveal-role ${rc}">${p.roleName}</span>${stolenInfo}
        ${!p.alive?'<span class="badge b-dead">Ölü</span>':''}
      </div>
    </div>`;
  }).join('');

  const mp = document.getElementById('mod-panel');
  mp.classList.remove('visible');
  showScreen('ended');
}

// ── Moderator panel ──────────────────────────────────────────
function updateModPanel() {
  const mp      = document.getElementById('mod-panel');
  const btnNext = document.getElementById('mod-btn-next');
  const btnElim = document.getElementById('mod-btn-elim');
  const inGame  = ['night','day','vote'].includes(currentPhase);

  if (isOwner && inGame) {
    mp.classList.add('visible');
    btnNext.disabled = false;
    btnElim.disabled = currentPlayers.filter(p=>p.alive && p.id !== socket.id).length === 0;
  } else {
    mp.classList.remove('visible');
    elimMode = false;
  }
}

function modNext() {
  socket.emit('mod:nextPhase');
  toast('⏭ Növbəti fazaya keçildi');
}

function modElimMode() {
  elimMode = !elimMode;
  const btn = document.getElementById('mod-btn-elim');
  btn.textContent = elimMode ? '❌ Ləğv et' : '🔪 Xaric Et';
  if (elimMode) toast('Xaric etmək üçün oyunçuya toxunun');
  highlightElimTargets();
}

function highlightElimTargets() {
  // Aktiv ekrandakı bütün canlı oyunçu elementlərini klikləyə bilən et
  document.querySelectorAll('.player-item:not(.dead)').forEach(el => {
    const id = el.dataset.id;
    if (!id || id === socket.id) return;
    if (elimMode) {
      el.classList.add('clickable');
      el.addEventListener('click', modElimClick);
    } else {
      el.removeEventListener('click', modElimClick);
    }
  });
}

function modElimClick(e) {
  if (!elimMode) return;
  const id = e.currentTarget.dataset.id;
  if (!id) return;
  const p = currentPlayers.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`${p.name}-i xaric etmək istəyirsiniz?`)) return;
  socket.emit('mod:eliminate', { targetId: id });
  elimMode = false;
  document.getElementById('mod-btn-elim').textContent = '🔪 Xaric Et';
}

// ── Game start ───────────────────────────────────────────────
function startGame() {
  const v = validateConfigClient(configValues, currentPlayers.length);
  if (!v.ok) { toast('❌ ' + v.error); return; }
  socket.emit('game:start', {}, (res) => {
    if (!res?.ok) toast('❌ ' + (res?.error || 'Xəta'));
  });
}

// ── Timer ────────────────────────────────────────────────────
function startTimer(name, total) {
  stopTimer(name);
  let rem = total;
  const bar   = document.getElementById(name + '-bar');
  const label = document.getElementById(name + '-label');
  if (bar)   bar.style.width = '100%';
  if (label) label.textContent = `${rem} saniyə`;
  timers[name] = setInterval(() => {
    rem--;
    if (bar)   bar.style.width = (rem / total * 100) + '%';
    if (label) label.textContent = rem > 0 ? `${rem} saniyə` : '';
    if (rem <= 0) stopTimer(name);
  }, 1000);
}
function stopTimer(name)  { clearInterval(timers[name]); delete timers[name]; }
function stopAllTimers()  { Object.keys(timers).forEach(stopTimer); }

// ── Utils ────────────────────────────────────────────────────
function copyCode() {
  navigator.clipboard.writeText(roomCode)
    .then(() => toast('📋 Kod kopyalandı: ' + roomCode));
}
function goHome() { sessionStorage.clear(); window.location.href = '/'; }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
