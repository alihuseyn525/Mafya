<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mafiya</title>
  <style>
    :root {
      --bg:#0f0e17;--surface:#1a1825;--border:#2e2b45;
      --accent:#c9392c;--accent2:#e8643a;--text:#e8e6f0;--muted:#7a7890;
      --green:#2ecc71;--yellow:#f1c40f;--radius:10px;
      --font-display:'Georgia',serif;--font-body:'Segoe UI',system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:24px}
    .hero{text-align:center;margin-bottom:40px}
    .hero-title{font-family:var(--font-display);font-size:clamp(2.4rem,6vw,4rem);
      letter-spacing:.12em;text-transform:uppercase;display:inline-block}
    .hero-title::after{content:'';display:block;height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      margin-top:6px;border-radius:2px}
    .hero-sub{margin-top:10px;color:var(--muted);font-size:.95rem;letter-spacing:.05em}
    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:28px 32px;width:100%;max-width:440px}
    .tabs{display:flex;margin-bottom:28px;border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden}
    .tab-btn{flex:1;padding:10px;background:transparent;border:none;
      color:var(--muted);font-size:.9rem;cursor:pointer;transition:background .18s,color .18s}
    .tab-btn.active{background:var(--accent);color:#fff;font-weight:600}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;
      color:var(--muted);margin-bottom:6px}
    input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);
      border-radius:var(--radius);color:var(--text);font-size:1rem;
      font-family:var(--font-body);outline:none;transition:border-color .18s}
    input:focus{border-color:var(--accent)}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;padding:13px;border:none;border-radius:var(--radius);font-size:1rem;
      font-weight:700;letter-spacing:.04em;cursor:pointer;transition:opacity .18s,transform .1s}
    .btn:active{transform:scale(.98)}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .error-msg{color:#ff6b6b;font-size:.85rem;margin-top:12px;min-height:20px;text-align:center}
    .panel{display:none}.panel.active{display:block}
    .loader{display:none;text-align:center;margin-top:16px;color:var(--muted);font-size:.9rem}
    .loader.visible{display:block}
    @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
    .dot{display:inline-block;animation:blink 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  </style>
</head>
<body>
<div class="hero">
  <h1 class="hero-title">Mafiya</h1>
  <p class="hero-sub">Şəhər yatır. Mafiya oyanır.</p>
</div>
<div class="card">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('create')">Otaq Yarat</button>
    <button class="tab-btn" onclick="switchTab('join')">Qoşul</button>
  </div>
  <div id="panel-create" class="panel active">
    <div class="form-group">
      <label for="create-name">Adın</label>
      <input id="create-name" type="text" maxlength="20" placeholder="Adını daxil et"/>
    </div>
    <button class="btn btn-primary" onclick="createRoom()">Otaq Yarat</button>
  </div>
  <div id="panel-join" class="panel">
    <div class="form-group">
      <label for="join-name">Adın</label>
      <input id="join-name" type="text" maxlength="20" placeholder="Adını daxil et"/>
    </div>
    <div class="form-group">
      <label for="join-code">Otaq Kodu</label>
      <input id="join-code" type="text" maxlength="6" placeholder="XXXXXX"
        style="text-transform:uppercase;letter-spacing:.2em;font-size:1.1rem"/>
    </div>
    <button class="btn btn-primary" onclick="joinRoom()">Qoşul</button>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <div class="loader" id="loader">
    Qoşulur<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0)===(tab==='create')));
    document.getElementById('panel-create').classList.toggle('active',tab==='create');
    document.getElementById('panel-join').classList.toggle('active',tab==='join');
    setError('');
  }
  function setError(msg){document.getElementById('error-msg').textContent=msg}
  function setLoading(on){
    document.getElementById('loader').classList.toggle('visible',on);
    document.querySelectorAll('.btn').forEach(b=>b.disabled=on);
  }
  function goToGame(code,name){
    sessionStorage.setItem('playerName',name);
    sessionStorage.setItem('roomCode',code);
    window.location.href='/game.html';
  }
  function createRoom(){
    const name=document.getElementById('create-name').value.trim();
    if(!name) return setError('Adını daxil et');
    setLoading(true);
    socket.emit('room:create',{name},(res)=>{
      setLoading(false);
      if(!res.ok) return setError(res.error);
      goToGame(res.code,name);
    });
  }
  function joinRoom(){
    const name=document.getElementById('join-name').value.trim();
    const code=document.getElementById('join-code').value.trim().toUpperCase();
    if(!name) return setError('Adını daxil et');
    if(code.length!==6) return setError('Kod 6 simvol olmalıdır');
    setLoading(true);
    socket.emit('room:join',{name,code},(res)=>{
      setLoading(false);
      if(!res.ok) return setError(res.error);
      goToGame(res.code,name);
    });
  }
  document.addEventListener('keydown',e=>{
    if(e.key!=='Enter') return;
    const active=document.querySelector('.panel.active').id;
    if(active==='panel-create') createRoom(); else joinRoom();
  });
</script>
</body>
</html>
